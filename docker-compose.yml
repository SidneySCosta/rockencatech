services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rockencatech_api
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-rockencatech}
      - DB_USERNAME=${DB_USERNAME:-rockencatech_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    networks:
      - rockencatech_network

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rockencatech_app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    networks:
      - rockencatech_network

  mysql:
    image: mysql:8.0
    container_name: rockencatech_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=${DB_DATABASE:-rockencatech}
      - MYSQL_USER=${DB_USERNAME:-rockencatech_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rockencatech_network

volumes:
  mysql_data:
    driver: local

networks:
  rockencatech_network:
    driver: bridge
